<div id="categoriesInput" class="row">
    <input type="hidden" name="categories" value="{% for category in obj.categories.all %}{% if not forloop.first %};{% endif %}{{ category.name }}{% endfor %}" />
    <div class="categories-input-current row"></div>
    <div class="search">
        <div class="search-bar">
            <input type="text" placeholder="category" class="search-input" size="10" autocomplete="off" />
        </div>
        <ul class="search-suggestions menu"></ul>
    </div>
</div>
<script>setupCategoryInput(categoriesInput)</script>
