{% extends "orgapy/layout/skeleton.html" %}
{% load static %}

{% block title %}{{project.reference}}{% endblock title %}

{% block head %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'orgapy/css/projects.css' %}" />
<script src="{% static 'orgapy/js/dragrank.js' %}"></script>
<script src="{% static 'orgapy/js/projects.js' %}"></script>
{% endblock head %}

{% block column_main %}
<div id="projectContainer" class="project-container" href="{{ project.get_absolute_url }}">{{ project.to_json_dict | json_script }}</div>
<script type="text/javascript">bindProject(projectContainer, "{% url 'orgapy:suggestions' %}", forceExpand=true)</script> 
{% endblock %}
