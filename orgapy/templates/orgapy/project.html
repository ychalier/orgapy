{% extends "orgapy/layout/skeleton.html" %}
{% load static %}

{% block title %}{{project.reference}}{% endblock title %}

{% block head %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'orgapy/css/projects.css' %}" />
<script src="{% static 'orgapy/js/dragrank.js' %}"></script>
<script src="{% static 'orgapy/js/projects.js' %}"></script>
{% endblock head %}

{% block column_main %}
<div id="projectsContainer"></div>
{% endblock column_main %}

{% block body_scripts %}
{{ block.super }}
<script>
    window.addEventListener("load", () => {
        fetchProjects(projectsContainer,
            noteId=null,
            forceExpand=true,
            statusFilter=null,
            projectId={{ project.id }});
    });
</script>
{% endblock body_scripts %}
