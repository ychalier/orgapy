{% extends "orgapy/layout/documents.html" %}

{% block title %}Trash{% endblock title %}

{% block content_title %}
<header class="card">
    <h1 class="card-header">Trash ({{ objects.paginator.count }})</h1>
    <div class="card-body">
        <span class="hint">Documents in trash for longer than <a href="{% url 'orgapy:settings' %}?next={{ request.get_full_path | urlencode }}">{{ request.user.settings.trash_period }} days</a> will be destroyed.</span>
    </div>
    <div class="card-actions">
        <form method="post" action="">
            {% csrf_token %}
            <button type="submit" name="restore" value="on" class="submit-confirm" message="Do you want to restore all ({{ objects.paginator.count }}) documents?"><i class="ri-arrow-left-up-box-line"></i> Restore All</a>
            <button type="submit" name="destroy" value="on" class="button-danger submit-confirm" message="Do you want to PERMANENTLY DELETE all ({{ objects.paginator.count }}) documents?"><i class="ri-file-shred-line"></i> Destroy All</a>
        </form>
    </div>
</header>
{% endblock content_title %}
