{% extends "orgapy/layout/skeleton.html" %}
{% load static %}
{% block title %}Edit '#{{ category.name }}'{% endblock title %}
{% block column_main %}
<form method="post" action="">
    {% csrf_token %}
    <div class="card">
        <h1 class="card-header">
            <input class="input-inline" type="text" name="name" value="{{ category.name }}" placeholder="Name" />
        </h1>
        <div class="card-body">{{ category.count }} object(s) have this tag.</div>
        <div class="card-actions">
            <button>Save</button>
        </div>
    </div>
</form>
<script>document.querySelector("h1 input").focus();</script>
{% endblock column_main %}
